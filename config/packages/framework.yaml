# see https://symfony.com/doc/current/reference/configuration/framework.html
framework:
    secret: '%env(APP_SECRET)%'

    # Stateless OAI-PMH service: no session, avoids Set-Cookie headers.
    session: false

    # Trust the reverse proxy (Traefik) so baseURL reflects the public scheme/host.
    # Set TRUSTED_PROXIES=private_ranges when running behind the shared proxy.
    trusted_proxies: '%env(default::TRUSTED_PROXIES)%'
    trusted_headers: ['x-forwarded-for', 'x-forwarded-host', 'x-forwarded-proto', 'x-forwarded-port']

    #esi: true
    #fragments: true

when@test:
    framework:
        test: true
